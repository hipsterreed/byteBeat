name = "bytebeat-api"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]
account_id = "58dc9ef6a3a1ca00034f0c751d6796c3"

# Durable Objects
[[durable_objects.bindings]]
name = "SESSION_DO"
class_name = "SessionDurableObject"

[[durable_objects.bindings]]
name = "TIMELINE_DO"
class_name = "TimelineDurableObject"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["SessionDurableObject", "TimelineDurableObject"]

# Vectorize index for sound search
[[vectorize]]
binding = "SOUND_INDEX"
index_name = "bytebeat-sounds"

# KV for caching generated audio
[[kv_namespaces]]
binding = "AUDIO_CACHE"
id = "825f161b66b74861816896560f8c3113"

# R2 for storing pre-baked audio files
[[r2_buckets]]
binding = "AUDIO_BUCKET"
bucket_name = "bytebeat-audio"

# Workers AI for the DJ agent
[ai]
binding = "AI"
